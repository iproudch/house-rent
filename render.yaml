services:
  - type: web
    name: house-rent-api
    env: node
    region: singapore
    plan: free
    rootDir: api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGIN
        value: https://house-rent-lcr.vercel.app